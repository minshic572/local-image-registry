# Cilium/Hubble Images Configuration
# These images are required for Cilium CNI and Hubble observability
images:
  - name: cilium
    source: quay.io/cilium/cilium:v1.19.5
    target: harbor.local:5001/cilium/cilium:v1.19.5
    mode: manifest-list
    platforms:
      - linux/amd64
      - linux/arm64

  - name: cilium-envoy
